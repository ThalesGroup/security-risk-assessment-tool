feature_key: issue-314
title: "Provide a dedicated flow for risks transferred from a dependency"
summary: >
  Allows users to define a risk that is transferred from a dependency with only its Description, Score, and Comment for its origin (dependency origin).
  This bypasses the complex calculations and individual assets/threats mapping of standard risks.

