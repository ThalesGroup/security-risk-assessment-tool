name: frontend
on: pull_request
jobs: 
  test: 
    runs-on: windows-latest
    steps: 
      - name: checkout repo
        uses: actions/checkout@v3
      - name: use node.js
        uses: actions/setup-node@v3
        with:
          node-version: '26.3.1'
      - run: npm install
        working-directory: app
      - run: npm run test
        working-directory: app
